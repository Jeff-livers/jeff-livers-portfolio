<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeff Livers</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #001F69;
      color: #ffffff;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 24px;
      text-align: center;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 48px;
      text-align: center;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.875rem;
    }

    input,
    textarea {
      background: #ffffff;
      border: none;
      border-radius: 50px;
      color: #111111;
      font-family: 'Roboto Mono', monospace;
      font-size: 1rem;
      padding: 14px 22px;
      width: 100%;
    }

    input::placeholder,
    textarea::placeholder {
      color: #cccccc;
    }

    textarea {
      border-radius: 24px;
      min-height: 120px;
      resize: vertical;
    }

    /* Honeypot — hidden from humans, bots fill it out */
    .honeypot {
      display: none;
    }

    button[type="submit"] {
      background: #ffffff;
      border: none;
      border-radius: 50px;
      color: #001F69;
      cursor: pointer;
      font-family: 'Roboto Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 22px;
      width: 100%;
    }

    @media (max-width: 480px) {
      body {
        padding: 32px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

  <h1>Jeff Livers</h1>

  <p>I turn business problems into designed, built solutions.</p>

  <!-- FORMSPREE: Replace YOUR_FORM_ID with your Formspree form ID -->
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

    <!-- Honeypot field — bots fill this out, humans don't see it -->
    <label class="honeypot">
      Don't fill this out
      <input type="text" name="_gotcha" tabindex="-1" autocomplete="off">
    </label>

    <label>
      Name
      <input type="text" name="name" placeholder="Your name" required>
    </label>

    <label>
      Email
      <input type="email" name="email" placeholder="your@email.com" required>
    </label>

    <label>
      Message
      <textarea name="message" placeholder="Your message" required></textarea>
    </label>

    <button type="submit">Send</button>

  </form>

  </div>

</body>
</html>
